<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문서 작성</title>
    <link rel="stylesheet" href="../CSS/web02_cafe.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-thin-rounded/css/uicons-thin-rounded.css'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>
<body>
    <h2 id="order_name"><i class="fi fi-rr-notebook-alt"></i> 주문서 작성</h2>
    <form>
        <fieldset>
            <legend>주문자 정보</legend>
                <label for="name">주문자 이름</label>
                <input id="name" type="text" size="6" maxlength="10" autofocus required><br>
                <!--size는 처음에 보이는 글자의 수, maxlength는 최대 글자 수-->
                <!--autofocus은 자동으로 선택되게 해줌, required는 필수 항목-->
                <label for="tel">연락처</label>
                <input id="tel" type="tel" value="010-"><br>
                <!--value는 입력하지 않아도 기본적으로 입력 되어 있는 값(기본값)-->
                <label for="email" placeholder="abc@dgsw.hs.kr">이메일</label>
                <input id="email" type="email">
        </fieldset>
        <fieldset>
            <legend>수령 방법 및 시간</legend>
                <label>수령 방식</label>
                <label><input type="radio" name="receive" value="pick">픽업</label>
                <label><input type="radio" name="receive" value="delivery">배달</label><br>
                <label for="day">픽업 날자</label>
                <input id="day" type="date"><br>
                <label for="time">픽업 시간</label>
                <input id="time" type="time">
        </fieldset>
        <fieldset>
            <legend>메뉴 및 상세 옵션</legend>
                <label for="menu">주문 메뉴</label>
                <select id="menu">
                   <!--multiple은 여러개를 선택할수 있게 해줌-->
                    <option value="armeri">아메리카노</option>
                    <option value="latte">카페라떼</option>
                    <option value="berry" selected>딸기 스무디</option>
                    <!--selected는 해당 옵션의 텍스트가 드롭다운에서 가장 먼저 보이게 해줌(자동선택)-->
                    <option value="green">녹차 라떼</option>
                </select><br>
                <label>Hot/Cold</label>
                <label><input type="radio" name="hc">Hot</label>
                <label><input type="radio" name="hc">Cold</label><br>
                <label for="ice">얼음량</label>
                <input id="ice" type="range" min="0" max="100" step="5" value="100"><br>
                <!--min은 최소, max는 최대, step은 간격-->
                <label>추가 옵션</label>
                <label><input type="checkbox" name="add_option" value="shot">샷 추가</label>
                <label><input type="checkbox" name="add_option" value="milk">우유 추가</label>
                <label><input type="checkbox" name="add_option" value="straw">빨대 추가</label><br>
                <label for="num">주문 수량</label>
                <input id="num" type="number" min="1" max="5" value="1">
        </fieldset>
        <fieldset>
            <legend>기타 요청 사항</legend>
                <label for="req">요청 사항</label>
                <textarea id="req" cols="30" rows="=3"></textarea><br>
                <label for="coupon">쿠폰 코드</label>
                <input id="coupon" type="search"><br>
                <label for="password">비밀번호(주문 확인용)</label>
                <input id="password" type="password" required>
        </fieldset>
        <!-- <input type="submit" value="주문하기">-->
        <!-- <input type="reset" value="취소하기"> -->
        <button type="submit" value="주문하기">주문하기</button>
        <button type="reset" value="취소하기">취소하기</button>
        <a href="web02_cafe.htm" target="_blank"><button type="button" value="뒤로가기">뒤로가기</button></a>

        <p>
            만일 수령할 상품에 문제가 있다면 즉시 반품 신청해 주세요<br>
            반품 신청 시 상품의 상태를 사진으로 첨부해 주세요<br>
            <input type="file">
        </p>
    </form>
</body>
</html>
